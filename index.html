<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily MARK">
<meta name="theme-color" content="#FAFAFA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daily MARK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#E8E8E8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{display:flex;gap:48px;align-items:flex-start;justify-content:center;max-width:1060px;padding:0 20px}
.phone{width:380px;height:780px;background:transparent;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.06);position:relative}
.phone-screen{width:100%;height:100%;background:#FAFAFA;border-radius:16px;overflow:hidden}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;font-size:11px;font-weight:600;color:#111;letter-spacing:.5px;position:sticky;top:0;background:#FAFAFA;z-index:10}
.status-bar .sb-right{display:flex;align-items:center;gap:6px}
.sb-battery{width:22px;height:10px;border:1px solid #111;border-radius:3px;padding:1.5px;display:flex;align-items:center}
.sb-battery-fill{width:14px;height:100%;background:#111;border-radius:1px}
.home-bar{width:120px;height:4px;background:#111;border-radius:2px;margin:12px auto 0;opacity:.3}
.phone-scroll{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:30px}
.phone-scroll::-webkit-scrollbar{width:0}

.home{padding:36px 20px 20px}
.home-greet{font-size:15px;color:#999;font-weight:400;margin-bottom:2px;letter-spacing:1px;text-transform:uppercase}
.home-name{font-size:28px;font-weight:600;color:#111;margin-bottom:4px;letter-spacing:-.5px;display:flex;justify-content:space-between;align-items:center}
.home-date{font-size:13px;color:#999;margin-bottom:24px;letter-spacing:.5px}

.stat-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:rgba(0,0,0,.75);border:1px solid rgba(0,0,0,.1);padding:12px 10px;text-align:center;cursor:pointer;border-radius:4px}
.stat-card .val{font-size:22px;font-weight:500;color:#fff}
.stat-card .lbl{font-size:10px;color:#aaa;margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.stat-card{position:relative;cursor:pointer}
.stat-card .edit-hint{position:absolute;top:6px;right:8px;font-size:9px;color:#999;opacity:0;transition:opacity .2s}
.stat-card:hover .edit-hint,.stat-card:active .edit-hint{opacity:1}
.chart-block{background:#FFF;border:1px solid #E8E8E8;padding:16px;margin-bottom:18px;display:none}
.chart-block.open{display:block}
.chart-block h4{font-size:11px;font-weight:500;color:#111;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.chart-toggle{text-align:center;padding:10px;color:#666;font-size:11px;letter-spacing:.5px;cursor:pointer;background:#FFF;border:1px solid #E8E8E8;margin-bottom:12px;border-radius:6px}


.today-block{background:#FFF;border:1px solid #E8E8E8;padding:20px;margin-bottom:18px}
.today-block h3{font-size:13px;font-weight:500;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.today-block h3 .dot{width:6px;height:6px;;background:#111}
.today-tag{display:inline-block;padding:3px 12px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.today-tag.gym{background:#111;color:#fff}
.today-tag.swim{background:#111;color:#fff}
.today-tag.dance{background:#111;color:#fff}
.today-tag.rest{background:transparent;color:#999;border:1px solid #E8E8E8}

.today-list{margin-top:4px}
.today-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F4F4F4}
.today-item:last-child{border-bottom:none}
.today-item .ti-icon{width:32px;height:32px;;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ti-gym{background:transparent}.ti-water{background:transparent}.ti-meal{background:transparent}
.ti-info{flex:1}
.ti-info .ti-title{font-size:13px;font-weight:500;color:#111}
.ti-info .ti-time{font-size:11px;color:#999}
.ti-check{width:18px;height:18px;;border:1px solid #E8E8E8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ti-check.done{background:#111;border-color:#111;color:#fff}

.prog-ring{display:flex;align-items:center;gap:14px;background:#FFF;border:1px solid #E8E8E8;padding:16px 20px;margin-bottom:18px}
.prog-circle{width:56px;height:56px;;background:conic-gradient(#111 0deg,#111 0deg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-circle-inner{width:42px;height:42px;;background:#FFF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#111}
.prog-info .pi-title{font-size:13px;font-weight:500;color:#111}
.prog-info .pi-sub{font-size:11px;color:#999;margin-top:2px}

.home-cta{display:block;width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:400;text-align:center;cursor:pointer;font-family:inherit;margin-bottom:12px;text-decoration:none}
.home-edit{display:block;text-align:center;color:#999;font-size:11px;text-decoration:none;letter-spacing:1px;text-transform:uppercase}

.water-block{background:#FFF;border:1px solid #E8E8E8;padding:20px;margin-bottom:18px}
.water-block h3{font-size:13px;font-weight:500;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.water-block h3 .dot{width:6px;height:6px;;background:#111}
.water-cup-wrap{display:flex;align-items:center;gap:18px}
.water-cup-svg{width:90px;height:130px;flex-shrink:0}
#wlGroup{transition:transform .7s ease}
@keyframes wave1{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes wave2{0%,100%{transform:translateX(5px)}50%{transform:translateX(0)}}
@keyframes bb1{0%{transform:translate(0,0);opacity:.6}50%{opacity:.2}100%{transform:translate(-7px,-42px);opacity:0}}
@keyframes bb2{0%{transform:translate(0,0);opacity:.5}60%{opacity:.2}100%{transform:translate(5px,-52px);opacity:0}}
@keyframes bb3{0%{transform:translate(0,0);opacity:.5}40%{opacity:.1}100%{transform:translate(-3px,-38px);opacity:0}}
.water-info{flex:1}
.water-info .wi-amt{font-size:32px;font-weight:700;color:#111;font-family:'SF Mono','Menlo','Consolas',monospace;letter-spacing:1px}
.water-info .wi-goal{font-size:11px;color:#999;margin-top:2px}
.water-dots{display:flex;gap:4px;margin-top:8px}
.water-dot{width:12px;height:12px;border:1px solid #E8E8E8;background:transparent;transition:all .3s}
.water-dot.filled{background:#111;border-color:#111;}

.stats-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.stats-modal-overlay.open{display:flex}
.stats-modal{background:#fff;border-radius:12px;padding:24px;width:280px;text-align:center}
.stats-modal h3{font-size:15px;font-weight:600;color:#111;margin-bottom:16px}
.stats-modal label{display:block;font-size:11px;color:#999;text-align:left;margin-bottom:4px;margin-top:10px}
.stats-modal input{width:100%;padding:8px;border:1px solid #E8E8E8;border-radius:4px;font-size:14px;outline:none;text-align:center}
.stats-modal input:focus{border-color:#111}
.stats-modal .sm-btn{padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin:4px}
.sm-btn-save{background:#111;color:#fff}
.sm-btn-cancel{background:#f5f5f5;color:#666}

</style>
</head>

const WD=['周日','周一','周二','周三','周四','周五','周六'];
const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
function T(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function DK(ds){return DAYS[new Date(ds+'T00:00:00').getDay()]}
function L(k){try{let r=localStorage.getItem('dm_'+k);return r?JSON.parse(r):{}}catch(e){return{}}}

// tidx = tracker item index (carefully counted with all water items)
// water indices: which tracker indices are water items for this day
const PLAN={
mon:{type:'gym',tag:'Monday',water:[1,2,4,5],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'17:30',icon:'训练',title:'练前加餐',tidx:6},{t:'18:00',icon:'训练',title:'拉日训练',tidx:7}]},
tue:{type:'gym',tag:'Tuesday',water:[1,2,4,5],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'18:00',icon:'训练',title:'推日训练',tidx:7},{t:'19:00',icon:'游泳',title:'游泳',tidx:8}]},
wed:{type:'rest',tag:'Wednesday',water:[1,2,4,6],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'18:30',icon:'午饭',title:'晚餐',tidx:5}]},
thu:{type:'gym',tag:'Thursday',water:[1,2,4,5],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'18:00',icon:'训练',title:'腿日训练',tidx:7},{t:'19:00',icon:'游泳',title:'游泳',tidx:8}]},
fri:{type:'gym',tag:'Friday',water:[1,2,4,5],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'18:00',icon:'训练',title:'肩臂日',tidx:7}]},
sat:{type:'swim',tag:'Saturday',water:[1,2,4,5,8],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'下午',icon:'游泳',title:'游泳',tidx:6}]},
sun:{type:'dance',tag:'Sunday',water:[1,2,7],
  items:[{t:'8:30',icon:'早饭',title:'早餐',tidx:0},{t:'12:00',icon:'午饭',title:'午餐',tidx:3},{t:'15:00',icon:'跳舞',title:'跳舞',tidx:5}]},
};

// Editable stats
let stats={weight:58.3,fat:35.9,muscle:19.9};
(function loadStats(){try{let v=localStorage.getItem('dm_stats_v2');if(v)stats=JSON.parse(v)}catch(e){}}());
function saveStats(){localStorage.setItem('dm_stats_v2',JSON.stringify(stats))}
let statHistory={
  '2026-05-25':{weight:58.5,fat:37.5,muscle:19.5},
  '2026-05-30':{weight:58.0,fat:36.3,muscle:19.8},
  '2026-06-15':{weight:58.3,fat:35.9,muscle:19.9}
};(function lh(){try{let v=localStorage.getItem('dm_stats_history_v2');if(v){let loaded=JSON.parse(v);if(Object.keys(loaded).length>=3)statHistory=loaded}}catch(e){}}());
function openStatsModal(){
  document.getElementById("mfWeight").value=stats.weight;
  document.getElementById("mfFat").value=stats.fat;
  document.getElementById("mfMuscle").value=stats.muscle;
  document.getElementById("statsModal").classList.add("open");
}
function closeStatsModal(){
  document.getElementById("statsModal").classList.remove("open");
}
function saveStatsModal(){
  let nw=parseFloat(document.getElementById("mfWeight").value);
  let nf=parseFloat(document.getElementById("mfFat").value);
  let nm=parseFloat(document.getElementById("mfMuscle").value);
  if(isNaN(nw)||isNaN(nf)||isNaN(nm)){alert("请填写有效数字");return;}
  stats.weight=nw;stats.fat=nf;stats.muscle=nm;
  saveStats();
  let today=T();
  statHistory[today]={weight:nw,fat:nf,muscle:nm};
  localStorage.setItem("dm_stats_history_v2",JSON.stringify(statHistory));
  closeStatsModal();
  renderHome();
}

function toggleChart(){
  let block=document.getElementById("chartBlock");
  let tog=document.getElementById("chartToggle");
  let isOpen=block.classList.contains("open");
  if(isOpen){block.classList.remove("open");tog.textContent="展开历史记录 ▾";}
  else{block.classList.add("open");tog.textContent="收起 ▴";renderChart();}
}

function renderChart(){
  let dates=Object.keys(statHistory).sort();
  if(dates.length===0){document.getElementById("chartBlock").innerHTML='<div style="text-align:center;color:#999;padding:20px;font-size:12px">暂无记录，点击上方编辑指标开始</div>';return;}
  if(dates.length<2){document.getElementById("chartBlock").innerHTML='<div style="text-align:center;color:#999;padding:20px;font-size:12px">至少需要2次记录（'+dates.length+'次），再编辑一次吧</div>';return;}
  let svg=document.getElementById("chartSvg");
  if(!svg)return;
  let w=svg.clientWidth||340,h=200,pad=30;
  let ww=w-pad*2,hh=h-pad*2;

  let keys=["weight","fat","muscle"];
  let colors=["#C49B8A","#8A9BAA","#9BAA8A"];
  let labels=["体重 kg","体脂率 %","骨骼肌 kg"];
  // Per-series ranges for adaptive scaling
  let ranges={};
  keys.forEach(key=>{
    let vals=[];dates.forEach(d=>{let v=statHistory[d][key];if(v!=null)vals.push(v)});
    if(vals.length>=2){
      let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
      let padV=(mx-mn)*0.3||0.5;
      ranges[key]={min:mn-padV,max:mx+padV};
    }
  });

  let svgH='<svg viewBox="0 0 '+w+' 200" style="width:100%;height:200px">';
  keys.forEach((key,ci)=>{
    if(!ranges[key])return;
    let r=ranges[key];
    let pts=[];
    dates.forEach((d,i)=>{
      let v=statHistory[d][key];
      if(v!=null){
        let x=pad+ww*i/(dates.length-1);
        let y=pad+hh-(v-r.min)/(r.max-r.min)*hh;
        pts.push({x,y,v});
      }
    });
    if(pts.length<2)return;
    // lines
    let d=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
    svgH+='<path d="'+d+'" fill="none" stroke="'+colors[ci]+'" stroke-width="2"/>';
    // dots
    pts.forEach(p=>{
      svgH+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+colors[ci]+'"/>';
      let ox=[-4,4,0],oy=[-6,-10,-14];
      svgH+='<text x="'+(p.x+ox[ci])+'" y="'+(p.y+oy[ci])+'" text-anchor="middle" font-size="9" fill="'+colors[ci]+'" font-weight="600">'+labels[ci].split(' ')[0]+' '+p.v+'</text>';
    });
  });
  // x labels
  dates.forEach((d,i)=>{
    let x=pad+ww*i/(dates.length-1);
    let lbl=d.slice(5);
    svgH+='<text x="'+x+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#999">'+lbl+'</text>';
  });
  svgH+='</svg>';
  // legend
  svgH+='<div style="display:flex;justify-content:center;gap:16px;margin-top:4px;font-size:10px;color:#999">';
  keys.forEach((k,i)=>{svgH+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+colors[i]+';margin-right:4px"></span>'+labels[i]+'</span>';});
  svgH+='</div>';
  document.getElementById("chartBlock").innerHTML=svgH;
}

function renderHome(){
  let v=T(),dk=DK(v),plan=PLAN[dk],cks=L('ck_'+v);
  let tagMap={gym:'gym',swim:'swim',dance:'dance',rest:'rest'};
  let el=document.getElementById('homeTag');
  el.className='today-tag '+tagMap[plan.type];el.textContent=plan.tag;

  // Update stat cards
  document.getElementById('homeDate').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+' · '+WD[new Date().getDay()];
  document.getElementById('statWeight').textContent=stats.weight;
  document.getElementById('statFat').innerHTML=stats.fat+'<small style="font-size:12px;font-weight:500">%</small>';
  document.getElementById('statMuscle').textContent=stats.muscle;
  

  // Water cup
  let waterCount=0,totalWater=plan.water.length;
  plan.water.forEach(wi=>{if(cks['t'+wi])waterCount++;});
  let waterMl=waterCount*200,targetMl=totalWater*200;
  let waterPct=targetMl>0?Math.round(waterMl/targetMl*100):0;
  let wl=document.getElementById('wlGroup');
  // Water rect is 92px tall. Cup clip visible from y=24 to y=108 (84px).
  // 0%→translateY(90) pushes water below clip. 100%→translateY(0).
  if(wl)wl.style.transform='translateY('+(90-waterPct/100*90)+'px)';
  document.getElementById('waterAmt').textContent=waterMl+'ml';
  document.getElementById('waterGoal').textContent='目标 '+targetMl+'ml';
  let remainMl=targetMl-waterMl;
  let bubble=document.getElementById('waterBubble');
  if(remainMl<=0)bubble.textContent='太棒了，今天喝够了！';
  else bubble.textContent='今天还要喝 '+remainMl+'ml 哦';
  let dots='';
  for(let i=0;i<totalWater;i++)dots+='<div class="water-dot'+(i<waterCount?' filled':'')+'"></div>';
  document.getElementById('waterDots').innerHTML=dots;

  let list=document.getElementById('homeList'),h='';
  plan.items.forEach((item)=>{
    let done=!!cks['t'+item.tidx];
    h+='<div class="today-item">';
    let ic='ti-gym';if(item.icon==='早饭'||item.icon==='午饭')ic='ti-meal';else if(item.icon==='游泳')ic='ti-water';
    let ico=TICONS[item.icon];h+='<div class="ti-icon '+ic+'">'+(ico?'<img src="'+ico+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">':item.icon)+'</div>';
    h+='<div class="ti-info"><div class="ti-title">'+item.title+'</div><div class="ti-time">'+item.t+'</div></div>';
    h+='<div class="ti-check'+(done?' done':'')+'">'+(done?'✓':'')+'</div>';
    h+='</div>';
  });
  list.innerHTML=h;

  let done=0,total=plan.items.length;
  plan.items.forEach((item)=>{if(cks['t'+item.tidx])done++;});
  let pct=total?Math.round(done/total*100):0;
  document.getElementById('homePct').textContent=pct+'%';
  document.getElementById('homeDone').textContent=done+'/'+total+' 已完成';
  let deg=pct/100*360;
  document.querySelector('.prog-circle').style.background='conic-gradient(#111 0deg,#111 '+deg+'deg,#E8E8E8 '+deg+'deg)';
}

renderHome();
// Refresh when iframe updates localStorage
window.addEventListener('storage',renderHome);
setInterval(renderHome,3000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
