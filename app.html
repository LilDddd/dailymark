<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily MARK">

<title>Daily MARK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#FAFAFA;color:#111;max-width:460px;margin:0 auto;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.view{display:none}.view.active{display:block}
/* ── home styles (from index.html) ── */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;font-size:11px;font-weight:600;color:#111;letter-spacing:.5px}
.home{padding:24px 20px 20px}
.home-greet{font-size:15px;color:#999;font-weight:400;margin-bottom:2px;letter-spacing:1px}
.home-name{font-size:28px;font-weight:600;color:#111;margin-bottom:4px;letter-spacing:-.5px;display:flex;justify-content:space-between;align-items:center}
.home-date{font-size:13px;color:#999;margin-bottom:24px;letter-spacing:.5px}
.stat-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:rgba(0,0,0,.75);border:1px solid rgba(0,0,0,.1);padding:12px 10px;text-align:center;cursor:pointer;border-radius:4px}
.stat-card .val{font-size:22px;font-weight:500;color:#fff}
.stat-card .lbl{font-size:10px;color:#aaa;margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.today-block,.water-block,.prog-ring{background:#FFF;border:1px solid #E8E8E8;padding:20px;margin-bottom:18px}
.today-block h3,.water-block h3{font-size:13px;font-weight:500;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.today-block h3 .dot,.water-block h3 .dot{width:6px;height:6px;border-radius:50%;background:#111}
.today-tag{display:inline-block;padding:3px 12px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.today-tag.gym{background:#111;color:#fff}
.today-tag.swim{background:#111;color:#fff}
.today-tag.dance{background:#111;color:#fff}
.today-tag.rest{background:transparent;color:#999;border:1px solid #E8E8E8}
.today-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F4F4F4}
.today-item:last-child{border-bottom:none}
.today-item .ti-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:transparent}
.ti-info{flex:1}.ti-info .ti-title{font-size:13px;font-weight:500;color:#111}.ti-info .ti-time{font-size:11px;color:#999}
.ti-check{width:18px;height:18px;border-radius:50%;border:1px solid #E8E8E8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ti-check.done{background:#111;border-color:#111;color:#fff}
.water-cup-svg{width:90px;height:130px;flex-shrink:0}
#wlGroup{transition:transform .7s ease}
@keyframes wave1{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes wave2{0%,100%{transform:translateX(5px)}50%{transform:translateX(0)}}
@keyframes bb1{0%{transform:translate(0,0);opacity:.6}50%{opacity:.2}100%{transform:translate(-7px,-42px);opacity:0}}
@keyframes bb2{0%{transform:translate(0,0);opacity:.5}60%{opacity:.2}100%{transform:translate(5px,-52px);opacity:0}}
@keyframes bb3{0%{transform:translate(0,0);opacity:.5}40%{opacity:.1}100%{transform:translate(-3px,-38px);opacity:0}}
.wi-amt{font-size:36px;font-weight:600;color:#111}
.wi-goal{font-size:11px;color:#999;margin-top:2px}
.water-dots{display:flex;gap:4px;margin-top:8px}
.water-dot{width:12px;height:12px;border:1px solid #E8E8E8;background:transparent;transition:all .3s}
.water-dot.filled{background:#111;border-color:#111;border-radius:50%}
.prog-ring{display:flex;align-items:center;gap:14px}
.prog-circle{width:56px;height:56px;border-radius:50%;background:conic-gradient(#111 0deg,#E8E8E8 0deg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-circle-inner{width:42px;height:42px;border-radius:50%;background:#FFF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#111}
.prog-info{flex:1}.prog-info .pi-title{font-size:13px;font-weight:500;color:#111}.prog-info .pi-sub{font-size:11px;color:#999;margin-top:2px}
.home-cta{display:block;width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:400;text-align:center;cursor:pointer;font-family:inherit;margin-bottom:12px;text-decoration:none}
.home-edit{display:block;text-align:center;color:#999;font-size:11px;text-decoration:none;letter-spacing:1px;text-transform:uppercase}
.chart-toggle{text-align:center;padding:10px;color:#666;font-size:11px;letter-spacing:.5px;cursor:pointer;background:#FFF;border:1px solid #E8E8E8;margin-bottom:12px;border-radius:6px}
.chart-block{background:#FFF;border:1px solid #E8E8E8;padding:16px;margin-bottom:18px;display:none}
.chart-block.open{display:block}
.stats-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.stats-modal-overlay.open{display:flex}
.stats-modal{background:#fff;border-radius:12px;padding:24px;width:280px;text-align:center}
.stats-modal h3{font-size:15px;font-weight:600;color:#111;margin-bottom:16px}
.stats-modal label{display:block;font-size:11px;color:#999;text-align:left;margin-bottom:4px;margin-top:10px}
.stats-modal input{width:100%;padding:8px;border:1px solid #E8E8E8;border-radius:4px;font-size:14px;outline:none;text-align:center}
.stats-modal input:focus{border-color:#111}
.sm-btn{padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin:4px}
.sm-btn-save{background:#111;color:#fff}
.sm-btn-cancel{background:#f5f5f5;color:#666}

/* ── tracker styles ── */
.trk-hdr{background:#fff;padding:16px;text-align:center;border-bottom:1px solid #E8E8E8;display:flex;align-items:center}
.trk-top-sticky{position:sticky;top:0;z-index:20;background:#fff}
.trk-back{font-size:18px;color:#111;cursor:pointer;padding:4px 8px;flex-shrink:0;background:none;border:none}
.trk-title{flex:1;text-align:center}
.trk-title img{max-width:120px;height:auto}
.trk-nav{margin-top:8px}
.trk-nav input{background:#fff;border:1px solid #E8E8E8;color:#111;padding:6px 12px;border-radius:20px;font-size:11px;text-align:center;outline:none;width:140px}
.trk-tag-row{margin-top:4px}
.trk-tag{display:inline-block;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tt-gym{background:#111;color:#fff}.tt-swim{background:#111;color:#fff}.tt-dance{background:#111;color:#fff}.tt-rest{background:transparent;color:#999;border:1px solid #E8E8E8}
.trk-prog{margin-top:6px;text-align:center}.trk-prog-bar{height:2px;background:#E8E8E8;width:160px;margin:0 auto;overflow:hidden}.trk-prog-fill{height:100%;background:#111;transition:width .35s}.trk-prog-txt{font-size:10px;color:#999;margin-top:2px}
.bb{background:#fff;padding:14px 16px;border-bottom:1px solid #E8E8E8}
.bb-rem{font-size:28px;font-weight:300;color:#111}.bb-days{font-size:11px;color:#999}.bb-sub{font-size:11px;color:#111;margin-top:4px}.bb-budget{border-bottom:1px solid #111;cursor:pointer}
.tl{position:relative;padding:0 14px 0 68px;margin:8px 0}
.tl-line{position:absolute;left:41px;top:12px;bottom:12px;width:1px;background:#E8E8E8}
.tl-item{position:relative;margin-bottom:18px}
.tl-dot{position:absolute;left:-43px;top:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;z-index:2}
.tl-dot img{width:32px;height:32px;opacity:.75}
.tl-item.done .tl-dot{}
.tl-item.done .tl-dot img{opacity:1}
.tl-time{font-family:'SF Mono','Menlo','Consolas',monospace;font-size:13px;color:#111;font-weight:600;margin-bottom:5px;letter-spacing:.5px}
.tl-card{background:#fff;padding:14px 16px;border:1px solid #E8E8E8;transition:all .25s}
.tl-item.done .tl-card{opacity:.5}
.tl-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.tl-title{font-size:14px;font-weight:600;color:#111}
.tl-badge{font-size:10px;padding:2px 10px;border-radius:20px;font-weight:600}
.bdg-sug{background:#F5F5F5;color:#111;border:1px solid #E8E8E8}
.bdg-warn{background:#111;color:#fff}
.tl-kcal{font-size:10px;color:#999}.tl-price{font-size:11px;color:#999;margin-left:auto}
.tl-illust{text-align:center;margin:8px 0 4px}
.tl-illust img{max-width:160px;max-height:140px;border-radius:18px}
.tl-desc{font-size:12px;color:#999;line-height:1.55;white-space:pre-line;margin-bottom:2px}
.tl-wo{margin-top:6px;padding:6px 0}
.tl-ex{font-size:12px;padding:2px 0;color:#999;line-height:1.5}
.tl-foot{display:flex;align-items:center;gap:10px;margin-top:10px}
.tl-check{display:flex;align-items:center;gap:5px}
.tl-check input{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid #E8E8E8;border-radius:8px;cursor:pointer;background:#FAFAFA;position:relative}
.tl-check input:checked{background:#111;border-color:#111}
.tl-check input:checked::after{content:'✓';position:absolute;top:0;left:3px;font-size:13px;color:#fff;font-weight:800}
.tl-check label{font-size:11px;color:#999}
.tl-spend{display:flex;align-items:center;gap:4px;margin-left:auto}
.tl-spend input{width:52px;background:#FAFAFA;border:1px solid #E8E8E8;border-radius:6px;padding:5px;font-size:12px;color:#111;text-align:center;outline:none}
.tl-spend input:focus{border-color:#111}
.tl-extra{margin-top:8px;padding-top:8px;border-top:1px solid #E8E8E8}
.btns{display:flex;gap:1px;padding:0;margin:24px 0 0;border-top:1px solid #E8E8E8;position:sticky;bottom:0;background:#fff;z-index:20}
.btn{flex:1;padding:16px;border:none;font-size:12px;font-weight:400;cursor:pointer;text-align:center;font-family:inherit;letter-spacing:2px;text-transform:uppercase;background:#fff}
.btn-dark{color:#999;border-right:1px solid #E8E8E8}.btn-dark:active{background:#FAFAFA;color:#111}
.btn-blue{background:#111;color:#fff}.btn-blue:active{background:#333}
.ft{text-align:center;padding:16px;color:#999;font-size:9px;letter-spacing:2px;text-transform:uppercase}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px}
.modal-box h2{font-size:18px;font-weight:600;color:#111;margin-bottom:16px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center}
.cal-day{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.cal-cell{padding:8px 4px;border-radius:12px;background:#F5F5F5}
.cal-cell .cal-num{font-size:12px;font-weight:600;color:#111;margin-bottom:4px}
.cal-cell .cal-icon{width:28px;height:28px;margin:0 auto}
.cal-cell .cal-icon img{width:100%;height:100%}
.cal-cell.today{box-shadow:0 0 0 2px #111}
.cal-cell.none{opacity:.3}
.modal-close{display:block;width:100%;margin-top:16px;padding:12px;background:#111;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
</style>
</head>

const BUDGET=1500;let vd=null;function V(){return vd||T()}function isT(){return V()===T()}
function getBgt(){let v=localStorage.getItem('dm_mbgt');return v?parseFloat(v):BUDGET}
function setBgt(v){localStorage.setItem('dm_mbgt',v)}
function calcMth(){
  let t=T(),d=new Date(+t.split('-')[0],+t.split('-')[1]-1,+t.split('-')[2]);
  let y=d.getFullYear(),m=d.getMonth(),dim=new Date(y,m+1,0).getDate(),td=d.getDate(),dl=dim-td+1,sp=0;
  for(let day=1;day<=td;day++){
    let ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    let bg=L(bgK(ds)),cks=L(ckK(ds)),dk=DK(ds),plan=PLAN[dk];
    plan.items.forEach((item,i)=>{if(item.price>0&&cks['t'+i])sp+=bg[item.id]!==undefined?bg[item.id]:item.price;});
    if(bg.other&&cks['t_other'])sp+=bg.other;
  }
  let r=getBgt()-sp,daily=dl>0?r/dl:r;
  return{spent:sp,remaining:r,daysLeft:dl,daily,budget:getBgt()};
}

function toggleChart(){
  let block=document.getElementById("chartBlock"),tog=document.getElementById("chartToggle");
  let isOpen=block.classList.contains("open");
  if(isOpen){block.classList.remove("open");tog.textContent="展开历史记录 ▾"}
  else{block.classList.add("open");tog.textContent="收起 ▴";renderChart()}
}

function renderChart(){
  let dates=Object.keys(statHistory).sort();
  if(dates.length===0){document.getElementById("chartBlock").innerHTML='<div style="text-align:center;color:#999;padding:20px;font-size:12px">暂无记录</div>';return;}
  if(dates.length<2){document.getElementById("chartBlock").innerHTML='<div style="text-align:center;color:#999;padding:20px;font-size:12px">至少需要2次记录（'+dates.length+'次）</div>';return;}
  let svg=document.getElementById("chartSvg");if(!svg)return;
  let w=svg.clientWidth||340,h=200,pad=30,ww=w-pad*2,hh=h-pad*2;
  let keys=["weight","fat","muscle"],colors=["#C49B8A","#8A9BAA","#9BAA8A"],labels=["体重 kg","体脂率 %","骨骼肌 kg"];
  let ranges={};
  keys.forEach(key=>{let vals=[];dates.forEach(d=>{let v=statHistory[d][key];if(v!=null)vals.push(v)});if(vals.length>=2){let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),padV=(mx-mn)*0.3||0.5;ranges[key]={min:mn-padV,max:mx+padV};}});
  let svgH='<svg viewBox="0 0 '+w+' 200" style="width:100%;height:200px">';
  keys.forEach((key,ci)=>{if(!ranges[key])return;let r=ranges[key],pts=[];dates.forEach((d,i)=>{let v=statHistory[d][key];if(v!=null){let x=pad+ww*i/(dates.length-1),y=pad+hh-(v-r.min)/(r.max-r.min)*hh;pts.push({x,y,v});}});if(pts.length<2)return;let d=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");svgH+='<path d="'+d+'" fill="none" stroke="'+colors[ci]+'" stroke-width="2"/>';pts.forEach(p=>{svgH+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+colors[ci]+'"/>';let ox=[-4,4,0],oy=[-6,-10,-14];svgH+='<text x="'+(p.x+ox[ci])+'" y="'+(p.y+oy[ci])+'" text-anchor="middle" font-size="9" fill="'+colors[ci]+'" font-weight="600">'+labels[ci].split(' ')[0]+' '+p.v+'</text>';});});
  dates.forEach((d,i)=>{let x=pad+ww*i/(dates.length-1),lbl=d.slice(5);svgH+='<text x="'+x+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#999">'+lbl+'</text>';});
  svgH+='</svg>';svgH+='<div style="display:flex;justify-content:center;gap:16px;margin-top:4px;font-size:10px;color:#999">';keys.forEach((k,i)=>{svgH+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+colors[i]+';margin-right:4px"></span>'+labels[i]+'</span>';});svgH+='</div>';
  document.getElementById("chartBlock").innerHTML=svgH;
}

function openStatsModal(){document.getElementById("mfWeight").value=stats.weight;document.getElementById("mfFat").value=stats.fat;document.getElementById("mfMuscle").value=stats.muscle;document.getElementById("statsModal").classList.add("open");}
function closeStatsModal(){document.getElementById("statsModal").classList.remove("open");}
function saveStatsModal(){
  let nw=parseFloat(document.getElementById("mfWeight").value),nf=parseFloat(document.getElementById("mfFat").value),nm=parseFloat(document.getElementById("mfMuscle").value);
  if(isNaN(nw)||isNaN(nf)||isNaN(nm)){alert("请填写有效数字");return;}
  stats.weight=nw;stats.fat=nf;stats.muscle=nm;saveStats();let today=T();statHistory[today]={weight:nw,fat:nf,muscle:nm};localStorage.setItem("dm_stats_history_v2",JSON.stringify(statHistory));closeStatsModal();setTimeout(function(){renderHome();}, 500);
}

// ═══════════ TRACKER ═══════════
function renderTrk(){
  let v=V(),dk=DK(v),plan=PLAN[dk],cks=L(ckK(v)),bg=L(bgK(v));
  let d=new Date(+v.split('-')[0],+v.split('-')[1]-1,+v.split('-')[2]),showingT=isT();
  let h='';
  h+='<div class="trk-top-sticky">';
  h+='<div class="trk-nav" style="text-align:center"><input type="date" id="dp" value="'+v+'" onchange="onDP()"></div>';
  h+='<div class="trk-tag-row" style="text-align:center"><span class="trk-tag '+plan.cls+'">'+plan.tag+'</span></div>';
  if(!showingT)h+='<div style="text-align:center;margin-top:4px"><a href="javascript:goToday()" style="color:#999;font-size:11px">📍 回到今天</a></div>';
  h+='<div class="trk-prog"><div class="trk-prog-bar"><div class="trk-prog-fill" id="pb" style="width:0%"></div></div><div class="trk-prog-txt" id="pt"></div></div>';

  let m=calcMth();
  h+='<div class="bb"><div style="display:flex;justify-content:space-between"><span class="bb-rem">¥'+m.remaining.toFixed(1)+'</span><span class="bb-days">剩 '+m.daysLeft+' 天</span></div><div class="bb-sub">已花 ¥'+m.spent.toFixed(1)+' / <span class="bb-budget" onclick="editBgt()">预算 ¥'+m.budget.toFixed(1)+'</span> · 日均 <b>¥'+m.daily.toFixed(1)+'</b>/天</div></div>';

  h+='</div>';// close sticky
  h+='<div class="tl"><div class="tl-line"></div>';
  let done=0,total=plan.items.length;
  plan.items.forEach((item,i)=>{
    let cid='t'+i,isDone=!!cks[cid];if(isDone)done++;
    h+='<div class="tl-item'+(isDone?' done':'')+'">';
    h+='<div class="tl-dot"><img src="'+ILLUST[isDone?'打卡状态图标':'未打卡状态图标']+'"></div>';
    h+='<div class="tl-time">'+item.t+'</div><div class="tl-card">';
    h+='<div class="tl-head"><span class="tl-title">'+item.title+'</span>';
    if(item.badge){let bc=item.badge==='建议'?'bdg-sug':'bdg-warn';h+='<span class="tl-badge '+bc+'">'+item.badge+'</span>';}
    if(item.cal)h+='<span class="tl-kcal">≈'+item.cal+' kcal</span>';
    if(item.price>0)h+='<span class="tl-price">计划 ¥'+item.price+'</span>';
    h+='</div>';
    if(item.desc)h+='<div class="tl-desc">'+item.desc+'</div>';
    if(item.ex){h+='<div class="tl-wo">';item.ex.forEach(e=>{h+='<div class="tl-ex">'+e+'</div>';});h+='</div>';}
    if(ILLUST[item.icon])h+='<div class="tl-illust"><img src="'+ILLUST[item.icon]+'"></div>';
    h+='<div class="tl-foot"><div class="tl-check"><input type="checkbox" id="'+cid+'" '+(isDone?'checked':'')+' onchange="tog(\''+cid+'\')"><label>打卡</label></div>';
    if(item.price>0){let sp=bg[item.id]!==undefined?bg[item.id]:'',df=sp!==''?parseFloat(sp)-item.price:0;h+='<div class="tl-spend"><label>实付¥</label><input type="number" step="0.1" id="sp_'+item.id+'" value="'+sp+'" placeholder="'+item.price+'" onchange="spChg(\''+item.id+'\')">';if(sp!==''&&df!==0)h+='<span style="font-size:10px;color:'+(df>0?'#C0504A':'#2A7D58')+'">'+(df>0?'+'+df.toFixed(1):df.toFixed(1))+'</span>';h+='</div>';}
    h+='</div></div></div>';
  });
  let oDone=!!cks['t_other'];
  h+='<div class="tl-item'+(oDone?' done':'')+'"><div class="tl-dot"><img src="'+ILLUST[oDone?'打卡状态图标':'未打卡状态图标']+'"></div><div class="tl-time">其他</div><div class="tl-card tl-extra">';
  if(ILLUST['吃零食'])h+='<div class="tl-illust"><img src="'+ILLUST['吃零食']+'"></div>';
  h+='<div class="tl-foot"><div class="tl-check"><input type="checkbox" id="t_other" '+(oDone?'checked':'')+' onchange="togO()"><label>打卡</label></div><span style="font-size:11px;color:#999">零食/饮料/非计划</span><div class="tl-spend"><label>¥</label><input type="number" step="0.1" id="sp_other" value="'+(bg.other||'')+'" placeholder="0" onchange="spO()"></div></div></div></div>';
  h+='</div>';
  h+='<div class="btns"><button class="btn btn-dark" onclick="resetDay()">重置当日</button><button class="btn btn-blue" onclick="showWeek()">本周概览</button></div>';
  document.getElementById('trk2Content').innerHTML=h;
  let pct=total?Math.round(done/total*100):0;let pb=document.getElementById('pb');if(pb)pb.style.width=pct+'%';let pt=document.getElementById('pt');if(pt)pt.textContent=done+'/'+total+' · '+pct+'%';
}

// ═══════════ TRACKER ACTIONS ═══════════
function onDP(){let v=document.getElementById('dp').value;vd=v===T()?null:v;renderTrk();renderHome()}
function goToday(){vd=null;renderTrk();renderHome()}
function editBgt(){let c=getBgt(),v=prompt('修改月预算：',c);if(v!==null){let n=parseFloat(v);if(!isNaN(n)&&n>0){setBgt(n);renderTrk()}}}
function tog(cid){let v=V(),c=L(ckK(v));c[cid]=!c[cid];S(ckK(v),c);renderTrk();renderHome()}
function togO(){let v=V(),c=L(ckK(v));c['t_other']=!c['t_other'];S(ckK(v),c);renderTrk()}
function spChg(id){let v=V(),b=L(bgK(v)),el=document.getElementById('sp_'+id),val=parseFloat(el.value);if(isNaN(val)||val<0){delete b[id]}else{b[id]=val}S(bgK(v),b);renderTrk()}
function spO(){let v=V(),b=L(bgK(v)),el=document.getElementById('sp_other'),val=parseFloat(el.value);if(isNaN(val)||val<0){delete b.other}else{b.other=val}S(bgK(v),b);renderTrk()}
function resetDay(){let v=V();if(confirm('重置 '+v+' 的记录？')){localStorage.removeItem('dm_'+ckK(v));localStorage.removeItem('dm_'+bgK(v));renderTrk();renderHome()}}

function showWeek(){
  let v=V(),p=v.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]),dow=d.getDay(),sun=new Date(d);sun.setDate(d.getDate()-dow);
  let calDayNames=['SUN','MON','TUE','WED','THU','FRI','SAT'],h='';
  calDayNames.forEach(dn=>{h+='<div class="cal-day">'+dn+'</div>';});
  for(let i=0;i<7;i++){let dt=new Date(sun);dt.setDate(sun.getDate()+i);let ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'),dk=DK(ds),plan=PLAN[dk],cks=L(ckK(ds));let total=plan.items.length,done=plan.items.filter((_,j)=>cks['t'+j]).length,isToday=ds===v,isFuture=ds>T(),iconKey;if(isFuture){iconKey=null}else if(done===total){iconKey='打卡状态图标'}else if(done>0){iconKey='未打卡状态图标'}else{iconKey=null}h+='<div class="cal-cell'+(isToday?' today':'')+(iconKey===null?' none':'')+'"><div class="cal-num">'+dt.getDate()+'</div>';if(iconKey)h+='<div class="cal-icon"><img src="'+ILLUST[iconKey]+'"></div>';else h+='<div class="cal-icon"></div>';h+='</div>';}
  document.getElementById('calGrid').innerHTML=h;document.getElementById('weekModal').classList.add('open');
}

// ═══════════ NAVIGATION ═══════════
function goTracker(){document.getElementById('homeView').classList.remove('active');document.getElementById('trkView').classList.add('active');renderTrk();window.scrollTo(0,0)}
function goHome(){document.getElementById('trkView').classList.remove('active');document.getElementById('homeView').classList.add('active');setTimeout(function(){renderHome();}, 500);window.scrollTo(0,0)}

// ═══════════ INIT ═══════════
setTimeout(function(){renderHome();}, 500);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
