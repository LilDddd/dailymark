<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Daily MARK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg1:#FAFAFA;--bg2:#FAFAFA;
  --card:#FFFFFF;
  --green:#111;--green-lt:#F5F5F5;
  --gold:#111;--gold-lt:#F5F5F5;
  --red:#111;--red-lt:#F5F5F5;
  --blue:#111;--blue-lt:#F5F5F5;
  --pur:#111;--pur-lt:#F5F5F5;
  --text:#111;--sub:#8A8A8A;--muted:#B5B5B5;
  --border:#E8E8E8;--shadow:0 2px 16px rgba(0,0,0,.04);
  --r-sm:12px;--r-md:24px;--r-lg:32px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#FAFAFA;color:var(--text);padding:0;max-width:460px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ── header ── */
.sticky-wrap{position:sticky;top:0;z-index:20}
.hdr{background:#fff;padding:8px 12px 4px;text-align:center;border-bottom:1px solid #E8E8E8;margin:0 12px}

.hdr h1{font-size:20px;font-weight:600;letter-spacing:1px;color:#111;margin-bottom:8px}
.hdr h1 span{color:#111;font-weight:700}

.date-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.date-nav input[type=date]{background:transparent;border:none;color:#111;padding:4px 8px;font-size:16px;font-weight:700;font-family:inherit;text-align:center;outline:none;-webkit-appearance:none;width:auto}
.date-nav input[type=date]:focus{border-color:#111}

.tag-row{display:flex;align-items:center;justify-content:center;gap:6px}
.tag{display:inline-block;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tag-gym{background:#111;color:#fff;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tag-swim{background:#111;color:#fff;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tag-dance{background:#111;color:#fff;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tag-rest{background:#111;color:#fff;padding:3px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}

.back-today{margin-top:8px}
.back-today a{color:#999;font-size:12px;text-decoration:none;font-weight:500}

.prog-wrap{margin-top:4px}
.prog-bar{height:2px;background:#E8E8E8;border-radius:1px;overflow:hidden;max-width:180px;margin:0 auto}
.prog-fill{height:100%;background:#111;border-radius:1px;transition:width .35s ease}
.prog-txt{font-size:10px;color:#999;margin-top:4px;letter-spacing:.5px}

/* ── budget bar ── */
.bb{background:#fff;padding:16px 18px;margin:0 12px;border-bottom:1px solid #E8E8E8}
.bb .bb-top{display:flex;justify-content:space-between;align-items:baseline}
.bb .bb-rem{font-size:28px;font-weight:300;color:var(--text);letter-spacing:-.5px}
.bb .bb-days{font-size:10px;color:var(--sub)}
.bb .bb-sub{font-size:10px;color:var(--text);margin-top:2px;line-height:1.3}
.bb .bb-budget{cursor:pointer;border-bottom:1px dashed var(--text);color:var(--text);font-weight:600}
.c-g{color:var(--text)}.c-y{color:var(--text)}.c-r{color:var(--text)}

/* ── timeline ── */
.tl{position:relative;padding:0 16px 0 76px;margin:8px 0}
.tl-line{position:absolute;left:47px;top:14px;bottom:14px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-51px;top:0px;width:48px;height:48px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:2;overflow:hidden;box-shadow:0 1px 8px rgba(80,70,40,.04)}
.tl-dot img{width:34px;height:34px;opacity:.75}

.tl-item.done .tl-dot{border-color:var(--text);background:var(--green-lt);box-shadow:0 1px 12px rgba(107,122,77,.15)}
.tl-item.done .tl-dot img{opacity:1}

.tl-time{display:inline-block;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:12px;color:#fff;font-weight:700;background:#111;padding:3px 8px;border-radius:0;margin-bottom:6px;letter-spacing:1px}

.tl-card{background:#fff;border-radius:16px;padding:16px 18px;border:1px solid #E8E8E8;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .25s ease}
.tl-item.done .tl-card{opacity:.45;border-color:#E8E8E8}

.tl-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tl-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.1px}
.tl-badge{font-size:10px;padding:2px 10px;border-radius:var(--r-lg);font-weight:600;letter-spacing:.3px}
.bdg-sug{background:var(--green-lt);color:var(--text)}
.bdg-warn{background:var(--gold-lt);color:#111}
.tl-kcal{font-size:10px;color:var(--muted);font-weight:500}
.tl-price{font-size:11px;color:var(--sub);margin-left:auto;font-weight:500}

.tl-illust{text-align:center;margin:10px 0 6px}
.tl-illust img{max-width:190px;max-height:155px;width:auto;height:auto;border-radius:var(--r-md);display:block;margin:0 auto}
.tl-desc{font-size:12px;color:var(--sub);line-height:1.6;white-space:pre-line;margin-bottom:4px}
.tl-wo{margin-top:6px;padding:6px 0}
.tl-ex{font-size:12px;padding:3px 0;color:var(--sub);line-height:1.5}

.tl-foot{display:flex;align-items:center;gap:12px;margin-top:12px}
.tl-check{display:flex;align-items:center;gap:6px}
.tl-check input[type=checkbox]{appearance:none;-webkit-appearance:none;width:22px;height:22px;border:2px solid var(--border);border-radius:var(--r-sm);flex-shrink:0;cursor:pointer;background:var(--bg);position:relative;transition:all .2s}
.tl-check input:checked{background:var(--text);border-color:var(--text);box-shadow:0 2px 8px rgba(107,122,77,.2)}
.tl-check input:checked::after{content:'✓';position:absolute;top:0;left:4px;font-size:14px;color:#fff;font-weight:800}
.tl-check label{font-size:12px;color:var(--sub);font-weight:500}

.tl-spend{display:flex;align-items:center;gap:5px;margin-left:auto}
.tl-spend label{font-size:10px;color:var(--muted)}
.tl-spend input{width:56px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px;font-size:12px;color:var(--text);text-align:center;outline:none;transition:border .2s}
.tl-spend input:focus{border-color:var(--text)}
.spend-diff{font-size:10px;min-width:36px;text-align:right;font-weight:600}

/* extra */
.tl-extra{margin-top:10px;padding-top:10px;border-top:1px solid #E8E8E8}
.tl-extra .tl-foot{padding:10px 14px;background:var(--card);border-radius:var(--r-md)}

/* ── buttons ── */
.btns{display:flex;gap:12px;padding:12px 14px;margin:0;position:sticky;bottom:0;background:#fff;border-top:1px solid #E8E8E8;z-index:20}
.btn{flex:1;padding:14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;letter-spacing:.3px;transition:all .2s}
.btn-dark{background:var(--bg);color:var(--sub);border:1px solid var(--border)}.btn-dark:active{background:#E0E0E0}
.btn-blue{background:var(--text);color:#fff}.btn-blue:active{background:#333}

.ft{text-align:center;padding:16px;color:var(--muted);font-size:10px;letter-spacing:.5px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal-box h2{font-size:18px;font-weight:600;color:#111;margin-bottom:16px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center}
.cal-day{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.cal-cell{padding:8px 4px;border-radius:12px;background:#F5F5F5}
.cal-cell .cal-num{font-size:12px;font-weight:600;color:#111;margin-bottom:4px}
.cal-cell .cal-icon{width:28px;height:28px;margin:0 auto}
.cal-cell .cal-icon img{width:100%;height:100%}
.cal-cell.today{box-shadow:0 0 0 2px #111}
.cal-cell.none{opacity:.3}
.modal-close{display:block;width:100%;margin-top:16px;padding:12px;background:#111;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
</style>
</head>
<body>

<div class="sticky-wrap">
<div class="hdr">
  <div style="text-align:left;margin-bottom:2px"><a href="javascript:if(window.parent!==window)window.parent.location.reload();else location.href='index.html'" style="font-size:11px;color:#999;text-decoration:none;font-weight:500">← 返回首页</a></div>

  <div class="date-nav">
    <input type="date" id="datePicker" onchange="onDatePick()">
  </div>
  <div class="tag-row" id="dayBadge"></div>
  <div id="backToday" style="display:none"><div class="back-today"><a href="javascript:goToday()">📍 回到今天</a></div></div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progBar" style="width:0%"></div></div>
    <div class="prog-txt" id="progText"></div>
  </div>
</div>

<div class="bb" id="budgetBar"></div>
</div><!-- /sticky-wrap -->
<div id="timeline"></div>

<div class="btns">
  <button class="btn btn-dark" onclick="resetDay()">重置当日</button>
  <button class="btn btn-blue" onclick="showWeek()">本周概览</button>
</div>


<div class="modal-overlay" id="weekModal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>📊 本周打卡记录</h2>
    <div class="cal-grid" id="calGrid"></div>
    <button class="modal-close" onclick="document.getElementById('weekModal').classList.remove('open')">关闭</button>
  </div>
</div>

DAYS=['sun','mon','tue','wed','thu','fri','sat'];

// ══ STORAGE ═════════════════════════════════════════════════
function T(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function DK(ds){let p=ds.split('-');return DAYS[new Date(+p[0],+p[1]-1,+p[2]).getDay()]}
function L(k){try{let r=localStorage.getItem('dm_'+k);return r?JSON.parse(r):{}}catch(e){return{}}}
function S(k,o){localStorage.setItem('dm_'+k,JSON.stringify(o))}
function ckK(d){return'ck_'+d}
function bgK(d){return'bg_'+d}
let vd=null;
function V(){return vd||T()}
function isT(){return V()===T()}
function getBgt(){let v=localStorage.getItem('dm_mbgt');return v?parseFloat(v):BUDGET}
function setBgt(v){localStorage.setItem('dm_mbgt',v)}

// ══ MONTHLY ═════════════════════════════════════════════════
function calcMth(){
  let t=T(),d=new Date(t+'T00:00:00'),y=d.getFullYear(),m=d.getMonth();
  let dim=new Date(y,m+1,0).getDate(),td=d.getDate(),dl=dim-td+1,sp=0;
  for(let day=1;day<=td;day++){
    let ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    let bg=L(bgK(ds)),cks=L(ckK(ds)),dk=DK(ds),plan=PLAN[dk];
    plan.items.forEach((item,i)=>{
      if(item.price>0&&cks['t'+i])sp+=bg[item.id]!==undefined?bg[item.id]:item.price;
    });
    if(bg.other&&cks['t_other'])sp+=bg.other;
  }
  let r=getBgt()-sp,daily=dl>0?r/dl:r;
  return{spent:sp,remaining:r,daysLeft:dl,daily,budget:getBgt()};
}

function renderBB(){
  let m=calcMth();
  let dCls='#111';
  let h='<div class="bb-top"><span class="bb-rem">¥'+m.remaining.toFixed(1)+'</span><span class="bb-days">剩 '+m.daysLeft+' 天</span></div>';

  document.getElementById('budgetBar').innerHTML=h;
}

// ══ ACTIONS ══════════════════════════════════════════════════
function onDatePick(){let v=document.getElementById('datePicker').value;vd=v===T()?null:v;render()}
function goDay(n){let p=V().split('-'),d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+n);let ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');vd=ds===T()?null:ds;render()}
function goToday(){vd=null;render()}
function editBgt(){let c=getBgt(),v=prompt('修改本月总预算：',c);if(v!==null){let n=parseFloat(v);if(!isNaN(n)&&n>0){setBgt(n);render()}}}

function tog(cid){let v=V(),c=L(ckK(v));c[cid]=!c[cid];S(ckK(v),c);render()}
function togO(){let v=V(),c=L(ckK(v));c['t_other']=!c['t_other'];S(ckK(v),c);render()}
function spChg(id,p){let v=V(),b=L(bgK(v)),el=document.getElementById('sp_'+id),val=parseFloat(el.value);if(isNaN(val)||val<0){delete b[id]}else{b[id]=val}S(bgK(v),b);render()}

function resetDay(){let v=V();if(confirm('重置 '+v+' 的所有记录？')){localStorage.removeItem('dm_'+ckK(v));localStorage.removeItem('dm_'+bgK(v));render()}}
function showWeek(){
  let v=V(),p=v.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]),dow=d.getDay(),sun=new Date(d);sun.setDate(d.getDate()-dow);
  let calDayNames=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let h='';
  calDayNames.forEach(dn=>{h+='<div class=\"cal-day\">'+dn+'</div>';});
  for(let i=0;i<7;i++){
    let dt=new Date(sun);dt.setDate(sun.getDate()+i);
    let ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'),dk=DK(ds),plan=PLAN[dk],cks=L(ckK(ds));
    let total=plan.items.length,done=plan.items.filter((_,j)=>cks['t'+j]).length;
    let isToday=ds===v,isFuture=ds>T();
    let iconKey;
    if(isFuture){iconKey=null}else if(done===total){iconKey='打卡状态图标'}else if(done>0){iconKey='未打卡状态图标'}else{iconKey=null}
    h+='<div class=\"cal-cell'+(isToday?' today':'')+(iconKey===null?' none':'')+'\">';
    h+='<div class=\"cal-num\">'+dt.getDate()+'</div>';
    if(iconKey)h+='<div class=\"cal-icon\"><img src=\"'+ILLUST[iconKey]+'\"></div>';
    else h+='<div class=\"cal-icon\"></div>';
    h+='</div>';
  }
  document.getElementById('calGrid').innerHTML=h;
  document.getElementById('weekModal').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('weekModal'))document.getElementById('weekModal').classList.remove('open');}

(function(){var p=new URLSearchParams(location.search);var gd=p.get('d');if(gd&&gd!==T())vd=gd;})();
render();
</script>
